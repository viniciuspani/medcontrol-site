[build]
  publish = "."

# ---------------------------------------------------------------
# Subdomínio privacidade.medcontrol.tec.br -> pasta /privacidade/
# ---------------------------------------------------------------
[[redirects]]
  from = "/*"
  to = "/privacidade/:splat"
  status = 200
  force = true
  conditions = { Host = ["privacidade.medcontrol.tec.br"] }

# ---------------------------------------------------------------
# Headers de segurança
# ---------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Permissions-Policy = "geolocation=(), camera=(), microphone=(), payment=()"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' https://cdn.jsdelivr.net; font-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self' https://formsubmit.co; frame-ancestors 'none'"

# Cache longo para assets estáticos
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML sem cache agressivo
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
