<?xml version="1.0" encoding="UTF-8"?>
<!--
  MedControl - logo mark (símbolo).
  Cápsula vertical inclinada 8° com gradiente brandBlue -> brandGreen.
  Dentro: cruz médica (topo) + checkmark (base), ambos brancos.
  viewBox 256x256 para uso geral.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <!-- Gradiente diagonal: bottom-left brandBlue -> top-right brandGreen -->
    <linearGradient id="capGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3E7896" />
      <stop offset="100%" stop-color="#7AB89A" />
    </linearGradient>
  </defs>

  <!-- Cápsula vertical centralizada, inclinada 8° -->
  <g transform="translate(128 128) rotate(8)">
    <!-- Pill: w=88, h=176, raio=44 -->
    <rect x="-44" y="-88" width="88" height="176" rx="44" ry="44" fill="url(#capGrad)" />

    <!-- Highlight sutil no canto interno superior-esquerdo (arco translúcido branco) -->
    <path d="M -32 -60 Q -36 -78 -16 -82"
          fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="4"
          stroke-linecap="round" />

    <!-- Cruz médica no topo (branca, arms iguais, cantos arredondados) -->
    <g transform="translate(0 -40)">
      <!-- Braço vertical -->
      <rect x="-7" y="-22" width="14" height="44" rx="3" ry="3" fill="#FFFFFF" />
      <!-- Braço horizontal -->
      <rect x="-22" y="-7" width="44" height="14" rx="3" ry="3" fill="#FFFFFF" />
    </g>

    <!-- Checkmark na base (branco, stroke, cantos arredondados) -->
    <path d="M -18 38 L -4 54 L 22 26"
          fill="none" stroke="#FFFFFF" stroke-width="10"
          stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
