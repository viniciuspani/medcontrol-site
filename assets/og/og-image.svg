<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3E7896" />
      <stop offset="100%" stop-color="#7AB89A" />
    </linearGradient>
    <linearGradient id="capGrad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3E7896" />
      <stop offset="100%" stop-color="#7AB89A" />
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative blurred circles -->
  <circle cx="980" cy="120" r="240" fill="url(#glow)"/>
  <circle cx="120" cy="540" r="280" fill="url(#glow)"/>

  <!-- Subtle grid texture (decorative dots) -->
  <g fill="rgba(255,255,255,0.08)">
    <circle cx="60" cy="60" r="3"/>
    <circle cx="160" cy="60" r="3"/>
    <circle cx="260" cy="60" r="3"/>
    <circle cx="60" cy="160" r="3"/>
    <circle cx="160" cy="160" r="3"/>
    <circle cx="1100" cy="60" r="3"/>
    <circle cx="1140" cy="120" r="3"/>
    <circle cx="40" cy="580" r="3"/>
    <circle cx="120" cy="600" r="3"/>
  </g>

  <!-- White card on the right with phone mockup feel -->
  <g transform="translate(820 80)" filter="url(#softShadow)">
    <rect x="0" y="0" width="300" height="470" rx="36" ry="36" fill="#FFFFFF"/>
    <rect x="14" y="14" width="272" height="442" rx="26" ry="26" fill="#F4F8FA"/>

    <!-- Phone status bar dot (notch) -->
    <rect x="120" y="26" width="60" height="8" rx="4" ry="4" fill="#1F2D35" opacity="0.25"/>

    <!-- Header inside phone -->
    <rect x="34" y="60" width="232" height="14" rx="4" ry="4" fill="#3E7896" opacity="0.85"/>
    <rect x="34" y="84" width="160" height="10" rx="3" ry="3" fill="#6B7B85" opacity="0.45"/>

    <!-- Med card 1 -->
    <rect x="34" y="120" width="232" height="80" rx="14" ry="14" fill="#FFFFFF" stroke="#E1E8EC" stroke-width="1.5"/>
    <circle cx="60" cy="160" r="14" fill="#3E7896"/>
    <rect x="84" y="142" width="120" height="10" rx="3" ry="3" fill="#1F2D35" opacity="0.85"/>
    <rect x="84" y="160" width="80" height="8" rx="2" ry="2" fill="#6B7B85" opacity="0.6"/>
    <rect x="84" y="176" width="60" height="8" rx="2" ry="2" fill="#7AB89A"/>

    <!-- Med card 2 -->
    <rect x="34" y="212" width="232" height="80" rx="14" ry="14" fill="#FFFFFF" stroke="#E1E8EC" stroke-width="1.5"/>
    <circle cx="60" cy="252" r="14" fill="#7AB89A"/>
    <rect x="84" y="234" width="140" height="10" rx="3" ry="3" fill="#1F2D35" opacity="0.85"/>
    <rect x="84" y="252" width="90" height="8" rx="2" ry="2" fill="#6B7B85" opacity="0.6"/>
    <rect x="84" y="268" width="50" height="8" rx="2" ry="2" fill="#7AB89A"/>

    <!-- Med card 3 -->
    <rect x="34" y="304" width="232" height="80" rx="14" ry="14" fill="#FFFFFF" stroke="#E1E8EC" stroke-width="1.5"/>
    <circle cx="60" cy="344" r="14" fill="#1B6FA0"/>
    <rect x="84" y="326" width="100" height="10" rx="3" ry="3" fill="#1F2D35" opacity="0.85"/>
    <rect x="84" y="344" width="70" height="8" rx="2" ry="2" fill="#6B7B85" opacity="0.6"/>
    <rect x="84" y="360" width="40" height="8" rx="2" ry="2" fill="#7AB89A"/>

    <!-- Bottom nav -->
    <rect x="34" y="408" width="232" height="36" rx="18" ry="18" fill="#3E7896" opacity="0.12"/>
    <circle cx="74" cy="426" r="6" fill="#3E7896"/>
    <circle cx="124" cy="426" r="6" fill="#6B7B85" opacity="0.5"/>
    <circle cx="174" cy="426" r="6" fill="#6B7B85" opacity="0.5"/>
    <circle cx="224" cy="426" r="6" fill="#6B7B85" opacity="0.5"/>
  </g>

  <!-- Logo mark (capsule) -->
  <g transform="translate(140 130) rotate(8)">
    <rect x="-44" y="-88" width="88" height="176" rx="44" ry="44" fill="url(#capGrad)" stroke="#FFFFFF" stroke-width="3"/>
    <path d="M -32 -60 Q -36 -78 -16 -82" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="4" stroke-linecap="round"/>
    <g transform="translate(0 -40)">
      <rect x="-7" y="-22" width="14" height="44" rx="3" ry="3" fill="#FFFFFF"/>
      <rect x="-22" y="-7" width="44" height="14" rx="3" ry="3" fill="#FFFFFF"/>
    </g>
    <path d="M -18 38 L -4 54 L 22 26" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Wordmark -->
  <text x="220" y="148" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="76" font-weight="800" letter-spacing="-2">
    <tspan fill="#FFFFFF">Med</tspan><tspan fill="#FFFFFF" opacity="0.85">Control</tspan>
  </text>

  <!-- Headline -->
  <text x="100" y="320" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="800" fill="#FFFFFF" letter-spacing="-2">
    Nunca mais esqueça
  </text>
  <text x="100" y="390" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="800" fill="#FFFFFF" letter-spacing="-2">
    um medicamento
  </text>

  <!-- Subline -->
  <text x="100" y="450" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.92)">
    Gestão inteligente para você e quem você cuida.
  </text>

  <!-- Pill CTA -->
  <g transform="translate(100 500)">
    <rect x="0" y="0" width="280" height="64" rx="32" ry="32" fill="#FFFFFF"/>
    <text x="140" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="700" fill="#3E7896">
      medcontrol.tec.br
    </text>
  </g>

  <!-- Tagline bottom-left -->
  <text x="100" y="600" font-family="-apple-system, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.75)" letter-spacing="2">
    GESTÃO INTELIGENTE DE MEDICAMENTOS
  </text>
</svg>
